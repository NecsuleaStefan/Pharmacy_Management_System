name: Qt Windows Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
   
    runs-on: windows-2022

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.10.2'        
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        

    - name: Compile Pharmacy System
      run: |
        
        mkdir build   
        qmake Pharmacy_Management_System.pro -spec win32-g++ "CONFIG+=debug" "CONFIG+=qml_debug" 
        ls ./build
        mingw32-make -f ./build/Desktop_Qt_6_10_2_MinGW_64_bit-Debug/Makefile qmake_all
        
        
